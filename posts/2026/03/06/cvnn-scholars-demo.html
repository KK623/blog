<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVNN领域学者全景图谱 | Demo版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', 'Noto Sans SC', sans-serif; background: linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%); }
    .scholar-card { transition: all 0.3s ease; }
    .scholar-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .expand-enter { max-height: 0; opacity: 0; }
    .expand-enter-active { max-height: 1000px; opacity: 1; transition: all 0.4s ease; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="min-h-screen" x-data="scholarApp()">
  
  <!-- Hero Section -->
  <header class="bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-600 text-white py-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <div class="inline-block bg-white/20 backdrop-blur px-4 py-2 rounded-full text-sm mb-4">🎓 Demo Version</div>
      <h1 class="text-4xl md:text-5xl font-bold mb-4">CVNN领域学者全景图谱</h1>
      <p class="text-xl text-blue-100 mb-8">10位核心研究者 · 深度档案 · 交互探索</p>
      
      <!-- Stats -->
      <div class="flex justify-center gap-8 flex-wrap">
        <div class="text-center">
          <div class="text-4xl font-bold" x-text="scholars.length"></div>
          <div class="text-blue-200 text-sm">核心学者</div>
        </div>
        <div class="text-center">
          <div class="text-4xl font-bold" x-text="uniqueInstitutions().length"></div>
          <div class="text-blue-200 text-sm">顶尖机构</div>
        </div>
        <div class="text-center">
          <div class="text-4xl font-bold" x-text="uniqueFields().length"></div>
          <div class="text-blue-200 text-sm">研究领域</div>
        </div>
        <div class="text-center">
          <div class="text-4xl font-bold" x-text="totalCitations()"></div>
          <div class="text-blue-200 text-sm">总引用数</div>
        </div>
      </div>
    </div>
  </header>

  <!-- Control Panel -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 -mt-8">
    <div class="bg-white rounded-2xl shadow-xl p-6">
      <!-- Search -->
      <div class="mb-4">
        <div class="relative">
          <input 
            type="text" 
            x-model="searchQuery"
            placeholder="搜索学者姓名、机构或领域..."
            class="w-full pl-12 pr-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
          <span class="absolute left-4 top-3.5 text-gray-400">🔍</span>
        </div>
      </div>
      
      <!-- Filter Tags -->
      <div class="flex flex-wrap gap-2">
        <button 
          @click="selectedField = ''"
          :class="selectedField === '' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'"
          class="px-4 py-2 rounded-full text-sm font-medium transition-colors"
        >
          全部
        </button>
        <template x-for="field in uniqueFields()" :key="field">
          <button 
            @click="selectedField = field"
            :class="selectedField === field ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'"
            class="px-4 py-2 rounded-full text-sm font-medium transition-colors"
            x-text="field"
          ></button>
        </template>
      </div>
      
      <!-- Sort & Count -->
      <div class="flex justify-between items-center mt-4 pt-4 border-t border-gray-100">
        <div class="text-sm text-gray-600">
          显示 <span class="font-semibold" x-text="filteredScholars().length"></span> 位学者
        </div>
        <div class="flex gap-2">
          <select x-model="sortBy" class="px-3 py-2 border border-gray-200 rounded-lg text-sm">
            <option value="citations">按引用数排序</option>
            <option value="h_index">按h-index排序</option>
            <option value="name">按姓名排序</option>
          </select>
          <button @click="exportJSON()" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm hover:bg-green-700">
            📥 导出JSON
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Charts Section -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
    <div class="grid md:grid-cols-2 gap-6">
      <!-- Field Distribution -->
      <div class="bg-white rounded-xl shadow-lg p-6">
        <h3 class="text-lg font-bold text-gray-800 mb-4">📊 领域分布</h3>
        <canvas id="fieldChart" height="200"></canvas>
      </div>
      
      <!-- Institution Stats -->
      <div class="bg-white rounded-xl shadow-lg p-6">
        <h3 class="text-lg font-bold text-gray-800 mb-4">🏛️ 机构统计</h3>
        <canvas id="institutionChart" height="200"></canvas>
      </div>
    </div>
  </div>

  <!-- Scholars Grid -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <template x-for="scholar in filteredScholars()" :key="scholar.id">
        <div 
          class="scholar-card bg-white rounded-2xl shadow-lg overflow-hidden cursor-pointer"
          @click="toggleExpand(scholar.id)"
        >
          <!-- Card Header -->
          <div class="p-6">
            <div class="flex items-start gap-4">
              <img 
                :src="scholar.photo" 
                :alt="scholar.name"
                class="w-20 h-20 rounded-full object-cover border-4 border-blue-100"
                @error="$event.target.src = 'https://ui-avatars.com/api/?name=' + encodeURIComponent(scholar.name) + '&background=0066cc&color=fff'"
              >
              <div class="flex-1 min-w-0">
                <h3 class="text-xl font-bold text-gray-900" x-text="scholar.name"></h3>
                <p class="text-sm text-gray-600 mt-1" x-text="scholar.institution"></p>
                <div class="flex flex-wrap gap-1 mt-2">
                  <template x-for="field in scholar.fields" :key="field">
                    <span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded-full" x-text="field"></span>
                  </template>
                </div>
              </div>
            </div>
            
            <!-- Quick Stats -->
            <div class="grid grid-cols-2 gap-4 mt-4 pt-4 border-t border-gray-100">
              <div class="text-center">
                <div class="text-2xl font-bold text-blue-600" x-text="scholar.h_index"></div>
                <div class="text-xs text-gray-500">h-index</div>
              </div>
              <div class="text-center">
                <div class="text-2xl font-bold text-green-600" x-text="formatNumber(scholar.citations)"></div>
                <div class="text-xs text-gray-500">引用数</div>
              </div>
            </div>
            
            <!-- Expand Hint -->
            <div class="text-center mt-4 text-sm text-gray-400">
              <span x-show="expandedId !== scholar.id">👆 点击展开详情</span>
              <span x-show="expandedId === scholar.id">👆 点击收起</span>
            </div>
          </div>
          
          <!-- Expanded Content -->
          <div 
            x-show="expandedId === scholar.id"
            x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 transform scale-y-0"
            x-transition:enter-end="opacity-100 transform scale-y-100"
            x-transition:leave="transition ease-in duration-200"
            x-transition:leave-start="opacity-100 transform scale-y-100"
            x-transition:leave-end="opacity-0 transform scale-y-0"
            class="border-t border-gray-100 bg-gray-50"
          >
            <div class="p-6 space-y-4">
              <!-- Bio -->
              <div>
                <h4 class="font-semibold text-gray-800 mb-2">📝 核心贡献</h4>
                <p class="text-sm text-gray-600 leading-relaxed" x-text="scholar.bio"></p>
              </div>
              
              <!-- Top Papers -->
              <div>
                <h4 class="font-semibold text-gray-800 mb-2">📄 代表作</h4>
                <ul class="space-y-2">
                  <template x-for="paper in scholar.top_papers" :key="paper.title">
                    <li class="text-sm bg-white p-3 rounded-lg border border-gray-200">
                      <div class="font-medium text-gray-800" x-text="paper.title"></div>
                      <div class="text-xs text-gray-500 mt-1">
                        <span x-text="paper.venue"></span> <span x-text="paper.year"></span> • 
                        <span class="text-green-600" x-text="paper.citations + ' 引用'"></span>
                      </div>
                    </li>
                  </template>
                </ul>
              </div>
              
              <!-- Collaborators -->
              <div x-show="scholar.collaborators.length > 0">
                <h4 class="font-semibold text-gray-800 mb-2">🤝 主要合作者</h4>
                <div class="flex flex-wrap gap-2">
                  <template x-for="collab in scholar.collaborators" :key="collab">
                    <span class="px-3 py-1 bg-purple-100 text-purple-700 text-xs rounded-full" x-text="collab"></span>
                  </template>
                </div>
              </div>
              
              <!-- Links -->
              <div class="flex gap-3 pt-2">
                <a :href="scholar.scholar_url" target="_blank" class="flex-1 text-center py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">
                  🔗 Google Scholar
                </a>
                <a :href="scholar.homepage" target="_blank" class="flex-1 text-center py-2 bg-gray-600 text-white rounded-lg text-sm hover:bg-gray-700">
                  🌐 个人主页
                </a>
              </div>
            </div>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-8 mt-12">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-lg">CVNN Scholars Interactive Map</p>
      <p class="mt-2 text-sm">Demo Version • 10 Scholars • Generated on 2026-03-06</p>
      <p class="mt-4 text-xs">💡 提示：此为演示版本，完整版将包含30-50位学者</p>
    </div>
  </footer>

        filteredScholars() {
          let result = this.scholars;
          
          // Filter by search query
          if (this.searchQuery) {
            const q = this.searchQuery.toLowerCase();
            result = result.filter(s => 
              s.name.toLowerCase().includes(q) ||
              s.institution.toLowerCase().includes(q) ||
              s.fields.some(f => f.toLowerCase().includes(q))
            );
          }
          
          // Filter by field
          if (this.selectedField) {
            result = result.filter(s => s.fields.includes(this.selectedField));
          }
          
          // Sort
          result = [...result].sort((a, b) => {
            if (this.sortBy === 'citations') return b.citations - a.citations;
            if (this.sortBy === 'h_index') return b.h_index - a.h_index;
            if (this.sortBy === 'name') return a.name.localeCompare(b.name);
            return 0;
          });
          
          return result;
        },
        
        uniqueFields() {
          const fields = new Set();
          this.scholars.forEach(s => s.fields.forEach(f => fields.add(f)));
          return Array.from(fields).sort();
        },
        
        uniqueInstitutions() {
          return [...new Set(this.scholars.map(s => s.institution))];
        },
        
        totalCitations() {
          return this.formatNumber(this.scholars.reduce((sum, s) => sum + s.citations, 0));
        },
        
        formatNumber(num) {
          if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
          if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
          return num.toString();
        },
        
        toggleExpand(id) {
          this.expandedId = this.expandedId === id ? null : id;
        },
        
        exportJSON() {
          const dataStr = JSON.stringify(this.scholars, null, 2);
          const blob = new Blob([dataStr], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'cvnn-scholars-demo.json';
          a.click();
        },
        
        initCharts() {
          // Field Distribution Chart
          const fieldCounts = {};
          this.scholars.forEach(s => {
            s.fields.forEach(f => {
              fieldCounts[f] = (fieldCounts[f] || 0) + 1;
            });
          });
          
          new Chart(document.getElementById('fieldChart'), {
            type: 'doughnut',
            data: {
              labels: Object.keys(fieldCounts),
              datasets: [{
                data: Object.values(fieldCounts),
                backgroundColor: ['#0066cc', '#28a745', '#ffc107', '#dc3545', '#6f42c1', '#20c997']
              }]
            },
            options: {
              responsive: true,
              plugins: {
                legend: { position: 'bottom' }
              },
              onClick: (e, elements) => {
                if (elements.length > 0) {
                  const index = elements[0].index;
                  const field = Object.keys(fieldCounts)[index];
                  this.selectedField = this.selectedField === field ? '' : field;
                }
              }
            }
          });
          
          // Institution Chart
          const instCounts = {};
          this.scholars.forEach(s => {
            const inst = s.institution.split(' / ')[0];
            instCounts[inst] = (instCounts[inst] || 0) + 1;
          });
          
          new Chart(document.getElementById('institutionChart'), {
            type: 'bar',
            data: {
              labels: Object.keys(instCounts),
              datasets: [{
                label: '学者数量',
                data: Object.values(instCounts),
                backgroundColor: '#0066cc'
              }]
            },
            options: {
              responsive: true,
              plugins: {
                legend: { display: false }
              },
              scales: {
                y: { beginAtZero: true, ticks: { stepSize: 1 } }
              }
            }
          });
        }
      }
    }
    
    // Initialize charts after Alpine loads
    document.addEventListener('alpine:initialized', () => {
      setTimeout(() => {
        const app = document.querySelector('[x-data]')._x_dataStack[0];
        app.initCharts();
      }, 100);
    });
  </script>
</body>
</html>
