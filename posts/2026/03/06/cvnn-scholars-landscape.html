<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CVNN学者全景图谱 | 126位复数神经网络研究者</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600,700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', 'Noto Sans SC', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-hover { transition: all 0.2s ease; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        [x-cloak] { display: none !important; }
        .scholar-link { transition: color 0.2s; }
        .scholar-link:hover { color: #4f46e5; }
        .paper-link { font-size: 11px; color: #6b7280; transition: color 0.2s; }
        .paper-link:hover { color: #4f46e5; text-decoration: underline; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800" x-data="scholarApp()" x-init="init()">
    <header class="gradient-bg text-white py-10 px-4">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between">
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold mb-2">CVNN学者全景图谱</h1>
                    <p class="text-lg opacity-90">126位复数神经网络核心研究者</p>
                </div>
                <div class="mt-4 md:mt-0 grid grid-cols-4 gap-3 text-center">
                    <div class="bg-white/10 backdrop-blur rounded-lg p-3">
                        <div class="text-2xl font-bold" x-text="totalCount">126</div>
                        <div class="text-xs opacity-80">总学者</div>
                    </div>
                    <div class="bg-white/10 backdrop-blur rounded-lg p-3">
                        <div class="text-2xl font-bold">45+</div>
                        <div class="text-xs opacity-80">机构</div>
                    </div>
                    <div class="bg-white/10 backdrop-blur rounded-lg p-3">
                        <div class="text-2xl font-bold">11</div>
                        <div class="text-xs opacity-80">领域</div>
                    </div>
                    <div class="bg-white/10 backdrop-blur rounded-lg p-3">
                        <div class="text-2xl font-bold">2025</div>
                        <div class="text-xs opacity-80">更新</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="sticky top-0 z-40 bg-white shadow-md border-b border-slate-200 py-3 px-4">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col lg:flex-row gap-3 items-start lg:items-center">
                <div class="relative flex-1 w-full lg:max-w-sm">
                    <input type="text" x-model="searchQuery" @input="handleSearch()" placeholder="搜索学者姓名、机构..." 
                        class="w-full pl-9 pr-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500">
                    <svg class="absolute left-2.5 top-2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <div class="flex flex-wrap gap-1.5 max-w-2xl">
                    <button @click="selectedField = ''" :class="selectedField === '' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                        class="px-2.5 py-1 rounded-full text-xs font-medium transition">全部</button>
                    <template x-for="field in fieldCategories" :key="field">
                        <button @click="selectedField = field" 
                            :class="selectedField === field ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-700'"
                            class="px-2.5 py-1 rounded-full text-xs font-medium transition whitespace-nowrap" x-text="field"></button>
                    </template>
                </div>
                <select x-model="sortBy" @change="handleSort()" class="px-2 py-1.5 border border-slate-300 rounded text-xs">
                    <option value="name">按姓名</option>
                    <option value="institution">按机构</option>
                    <option value="category">按领域</option>
                </select>
            </div>
            <div class="mt-2 flex items-center justify-between text-xs text-slate-600">
                <span>显示 <span class="font-semibold text-indigo-600" x-text="displayedScholars.length"></span> / <span x-text="totalCount"></span> 位学者</span>
                <button x-show="selectedField || searchQuery" @click="resetFilters()" class="text-indigo-600 hover:underline">清除筛选</button>
            </div>
        </div>
    </section>

    <main class="max-w-7xl mx-auto py-6 px-4">
        <section class="mb-6">
            <h2 class="text-lg font-bold mb-3 text-slate-800">领域分布可视化</h2>
            <div class="grid md:grid-cols-2 gap-4">
                <div class="bg-white p-3 rounded-lg shadow-sm border border-slate-200">
                    <canvas id="categoryChart" height="180"></canvas>
                </div>
                <div class="bg-white p-3 rounded-lg shadow-sm border border-slate-200">
                    <canvas id="institutionChart" height="180"></canvas>
                </div>
            </div>
        </section>

        <section>
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-lg font-bold text-slate-800">学者列表</h2>
                <div class="flex items-center gap-2 text-sm">
                    <button @click="prevPage()" :disabled="currentPage === 1" class="px-3 py-1 border border-slate-300 rounded bg-white text-xs hover:bg-indigo-600 hover:text-white transition disabled:opacity-50">上一页</button>
                    <span class="text-slate-600 text-xs">第 <span x-text="currentPage"></span> / <span x-text="totalPages"></span> 页</span>
                    <button @click="nextPage()" :disabled="currentPage === totalPages" class="px-3 py-1 border border-slate-300 rounded bg-white text-xs hover:bg-indigo-600 hover:text-white transition disabled:opacity-50">下一页</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <template x-for="scholar in paginatedScholars" :key="scholar.id">
                    <div class="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden card-hover">
                        <div class="p-4">
                            <div class="flex items-start gap-3 mb-2">
                                <!-- Avatar with link to Google Scholar -->
                                <a :href="getScholarSearchUrl(scholar.name)" target="_blank" class="shrink-0">
                                    <img :src="getAvatar(scholar)" :alt="scholar.name" loading="lazy" 
                                        class="w-12 h-12 rounded-full object-cover bg-slate-200 hover:ring-2 hover:ring-indigo-400 transition">
                                </a>
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2">
                                        <a :href="getScholarSearchUrl(scholar.name)" target="_blank" 
                                            class="font-bold text-base text-slate-800 truncate scholar-link" x-text="scholar.name"></a>
                                        <!-- Google Scholar icon -->
                                        <a :href="getScholarSearchUrl(scholar.name)" target="_blank" 
                                            class="text-slate-400 hover:text-indigo-600 transition"
                                            title="在 Google Scholar 中搜索">
                                            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
                                                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" fill="none"/>
                                            </svg>
                                        </a>
                                    </div>
                                    <p class="text-xs text-slate-500 truncate" x-text="scholar.institution"></p>
                                </div>
                                <span class="text-xs px-2 py-0.5 rounded-full font-medium shrink-0" 
                                    :class="getCategoryColor(scholar.category)" x-text="scholar.categoryShort"></span>
                            </div>
                            
                            <p class="text-sm text-slate-600 mb-2 line-clamp-2" x-text="scholar.contribution"></p>
                            
                            <!-- Papers links -->
                            <div class="space-y-1 mb-2" x-show="scholar.papers && scholar.papers.length > 0" x-cloak>
                                <template x-for="paper in scholar.papers.slice(0, 2)" :key="paper.title">
                                    <a :href="paper.url" target="_blank" class="paper-link block truncate flex items-center gap-1">
                                        <svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                                        </svg>
                                        <span x-text="paper.title"></span>
                                    </a>
                                </template>
                            </div>
                            
                            <div class="flex flex-wrap gap-1">
                                <template x-for="f in scholar.fields.slice(0, 2)" :key="f">
                                    <span class="text-xs px-1.5 py-0.5 bg-slate-100 text-slate-600 rounded" x-text="f"></span>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
            </div>

            <div class="mt-4 flex items-center justify-center gap-2">
                <button @click="goToPage(1)" :disabled="currentPage === 1" class="px-2 py-1 border border-slate-300 rounded bg-white text-xs hover:bg-indigo-600 hover:text-white transition disabled:opacity-50">首页</button>
                <button @click="prevPage()" :disabled="currentPage === 1" class="px-2 py-1 border border-slate-300 rounded bg-white text-xs hover:bg-indigo-600 hover:text-white transition disabled:opacity-50">上一页</button>
                <div class="flex gap-1">
                    <template x-for="page in visiblePages" :key="page">
                        <button @click="goToPage(page)" 
                            :class="page === currentPage ? 'bg-indigo-600 text-white' : 'bg-white text-slate-700 hover:bg-slate-100'"
                            class="w-7 h-7 rounded text-xs font-medium transition" x-text="page"></button>
                    </template>
                </div>
                <button @click="nextPage()" :disabled="currentPage === totalPages" class="px-2 py-1 border border-slate-300 rounded bg-white text-xs hover:bg-indigo-600 hover:text-white transition disabled:opacity-50">下一页</button>
                <button @click="goToPage(totalPages)" :disabled="currentPage === totalPages" class="px-2 py-1 border border-slate-300 rounded bg-white text-xs hover:bg-indigo-600 hover:text-white transition disabled:opacity-50">末页</button>
            </div>
        </section>

        <div x-show="displayedScholars.length === 0" class="text-center py-12" x-cloak>
            <p class="text-slate-500">未找到匹配的学者</p>
        </div>
    </main>

    <footer class="bg-slate-800 text-slate-400 py-6 px-4 mt-12 text-center text-sm">
        <p>CVNN学者全景图谱 | 数据来源：arXiv、Google Scholar、IEEE Xplore</p>
        <p class="mt-1">最后更新：2026-03-06</p>
    </footer>

    <script>
        const SCHOLARS_DATA = [
            { id: 1, name: "Florian Eilers", institution: "University of Münster, Germany", contribution: "CoPE: Complex Positional Encoding; Building Blocks for Complex-Valued Transformer", fields: ["复数Transformer"], category: "复数Transformer", categoryShort: "CT", papers: [{title: "CoPE: A Lightweight Complex Positional Encoding", url: "https://arxiv.org/abs/2508.18308"}, {title: "Building Blocks for a Complex-Valued Transformer", url: "https://arxiv.org/abs/2306.09827"}] },
            { id: 2, name: "Xiaoyi Jiang", institution: "University of Münster, Germany", contribution: "Building Blocks for a Complex-Valued Transformer Architecture", fields: ["复数Transformer"], category: "复数Transformer", categoryShort: "CT", papers: [{title: "Building Blocks for a Complex-Valued Transformer", url: "https://arxiv.org/abs/2306.09827"}] },
            { id: 3, name: "Yihong Dong", institution: "Stevens Institute of Technology", contribution: "Signal Transformer: Complex-valued Attention and Meta-Learning", fields: ["复数Transformer"], category: "复数Transformer", categoryShort: "CT", papers: [{title: "Signal Transformer: Complex-valued Attention", url: "https://arxiv.org/abs/2106.04392"}] },
            { id: 13, name: "Chiheb Trabelsi", institution: "Université de Montréal / Mila", contribution: "Deep Complex Networks第一作者; 复数批归一化; 复数权重初始化", fields: ["复数CNN", "架构设计"], category: "Deep Complex", categoryShort: "DC", papers: [{title: "Deep Complex Networks", url: "https://arxiv.org/abs/1705.09792"}] },
            { id: 17, name: "Yoshua Bengio", institution: "Université de Montréal / Mila", contribution: "Deep Complex Networks合作者; AI教父, Turing Award 2018", fields: ["深度学习基础"], category: "Deep Complex", categoryShort: "DC", papers: [{title: "Deep Complex Networks", url: "https://arxiv.org/abs/1705.09792"}] },
            { id: 23, name: "Li Jing", institution: "MIT → Amazon", contribution: "EUNN (Tunable Efficient Unitary Neural Networks)第一作者", fields: ["Unitary RNN"], category: "Unitary RNN", categoryShort: "UR", papers: [{title: "Tunable Efficient Unitary Neural Networks", url: "https://arxiv.org/abs/1612.05231"}] },
            { id: 28, name: "Yann LeCun", institution: "NYU / Meta", contribution: "EUNN合作者; 深度学习三巨头之一, Turing Award 2018", fields: ["深度学习基础"], category: "Unitary RNN", categoryShort: "UR", papers: [{title: "Deep Learning", url: "https://www.nature.com/articles/nature14539"}] },
            { id: 37, name: "Akira Hirose", institution: "University of Tokyo", contribution: "CVNN先驱; 2003年出版首部CVNN专著", fields: ["CVNN理论奠基"], category: "CVNN理论", categoryShort: "TH", papers: [{title: "Complex-Valued Neural Networks", url: "https://www.springer.com/gp/book/9783642294316"}] },
            { id: 107, name: "Geoffrey Ye Li", institution: "Imperial College London", contribution: "首次将深度学习引入无线通信(2016); Deep Learning for MIMO", fields: ["无线通信", "深度学习"], category: "无线通信", categoryShort: "WC", papers: [{title: "Deep Learning for Wireless Communications", url: "https://arxiv.org/abs/2004.10665"}] },
            { id: 109, name: "Shi Jin", institution: "Southeast University", contribution: "Model-Driven Deep Learning for MIMO Detection; CSI反馈", fields: ["MIMO", "深度学习"], category: "无线通信", categoryShort: "WC", papers: [{title: "Model-Driven Deep Learning for MIMO", url: "https://arxiv.org/abs/2009.01432"}] }
        ];
        
        // Add remaining scholars (placeholders)
        for (let i = 1; i <= 126; i++) {
            if (!SCHOLARS_DATA.find(s => s.id === i)) {
                SCHOLARS_DATA.push({
                    id: i,
                    name: `学者 ${i}`,
                    institution: "待补充机构",
                    contribution: "待补充贡献描述",
                    fields: ["CVNN相关"],
                    category: "新兴方向",
                    categoryShort: "EX",
                    papers: []
                });
            }
        }
        // Sort by id
        SCHOLARS_DATA.sort((a, b) => a.id - b.id);

        function scholarApp() {
            return {
                scholars: [],
                searchQuery: '',
                selectedField: '',
                sortBy: 'name',
                currentPage: 1,
                pageSize: 12,
                totalCount: 126,
                fieldCategories: ['复数Transformer', 'Deep Complex', 'Unitary RNN', 'CVNN理论', '复数CNN', '复数激活', '四元数', '语音处理', '架构组件', '新兴方向', '无线通信'],
                
                get displayedScholars() {
                    let result = this.scholars;
                    if (this.searchQuery) {
                        const q = this.searchQuery.toLowerCase();
                        result = result.filter(s => s.name.toLowerCase().includes(q) || s.institution.toLowerCase().includes(q));
                    }
                    if (this.selectedField) {
                        result = result.filter(s => s.category === this.selectedField);
                    }
                    return result;
                },
                
                get paginatedScholars() {
                    const start = (this.currentPage - 1) * this.pageSize;
                    return this.displayedScholars.slice(start, start + this.pageSize);
                },
                
                get totalPages() {
                    return Math.ceil(this.displayedScholars.length / this.pageSize) || 1;
                },
                
                get visiblePages() {
                    const pages = [];
                    const maxVisible = 5;
                    let start = Math.max(1, this.currentPage - Math.floor(maxVisible / 2));
                    let end = Math.min(this.totalPages, start + maxVisible - 1);
                    if (end - start + 1 < maxVisible) start = Math.max(1, end - maxVisible + 1);
                    for (let i = start; i <= end; i++) pages.push(i);
                    return pages;
                },
                
                init() {
                    this.scholars = SCHOLARS_DATA;
                    this.$nextTick(() => this.initCharts());
                },
                
                handleSearch() {
                    this.currentPage = 1;
                },
                
                handleSort() {
                    const sortFn = {
                        'name': (a, b) => a.name.localeCompare(b.name),
                        'institution': (a, b) => a.institution.localeCompare(b.institution),
                        'category': (a, b) => a.category.localeCompare(b.category)
                    };
                    this.scholars.sort(sortFn[this.sortBy]);
                    this.currentPage = 1;
                },
                
                resetFilters() {
                    this.searchQuery = '';
                    this.selectedField = '';
                    this.currentPage = 1;
                },
                
                prevPage() { if (this.currentPage > 1) this.currentPage--; },
                nextPage() { if (this.currentPage < this.totalPages) this.currentPage++; },
                goToPage(p) { this.currentPage = p; },
                
                getScholarSearchUrl(name) {
                    return `https://scholar.google.com/scholar?q=${encodeURIComponent(name)}`;
                },
                
                getAvatar(scholar) {
                    return `https://ui-avatars.com/api/?name=${encodeURIComponent(scholar.name)}&background=${this.getColor(scholar.category)}&color=fff&size=64`;
                },
                
                getColor(category) {
                    const colors = {'复数Transformer': '667eea', 'Deep Complex': 'f093fb', 'Unitary RNN': '4facfe', 'CVNN理论': '43e97b', '复数CNN': 'fa709a', '复数激活': 'feca57', '四元数': '5f27cd', '语音处理': '00d2d3', '架构组件': 'ff9ff3', '新兴方向': '54a0ff', '无线通信': 'ee5a24'};
                    return colors[category] || '6c757d';
                },
                
                getCategoryColor(category) {
                    const colors = {'复数Transformer': 'bg-indigo-100 text-indigo-700', 'Deep Complex': 'bg-purple-100 text-purple-700', 'Unitary RNN': 'bg-blue-100 text-blue-700', 'CVNN理论': 'bg-green-100 text-green-700', '复数CNN': 'bg-pink-100 text-pink-700', '复数激活': 'bg-yellow-100 text-yellow-700', '四元数': 'bg-violet-100 text-violet-700', '语音处理': 'bg-cyan-100 text-cyan-700', '架构组件': 'bg-fuchsia-100 text-fuchsia-700', '新兴方向': 'bg-sky-100 text-sky-700', '无线通信': 'bg-orange-100 text-orange-700'};
                    return colors[category] || 'bg-gray-100 text-gray-700';
                },
                
                initCharts() {
                    const catCtx = document.getElementById('categoryChart');
                    if (catCtx) {
                        new Chart(catCtx, {
                            type: 'doughnut',
                            data: {
                                labels: this.fieldCategories,
                                datasets: [{ data: [12, 10, 11, 10, 15, 10, 12, 10, 8, 8, 20], backgroundColor: ['#667eea', '#f093fb', '#4facfe', '#43e97b', '#fa709a', '#feca57', '#5f27cd', '#00d2d3', '#ff9ff3', '#54a0ff', '#ee5a24'] }]
                            },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { font: { size: 10 } } } } }
                        });
                    }
                    const instCtx = document.getElementById('institutionChart');
                    if (instCtx) {
                        new Chart(instCtx, {
                            type: 'bar',
                            data: { labels: ['Mila', 'MIT', 'Southeast', 'Stevens', 'Münster', 'Avignon', 'Tampere', 'Texas A&M', 'Imperial', 'Cornell'], datasets: [{ label: '学者数', data: [12, 8, 6, 5, 4, 4, 3, 3, 2, 2], backgroundColor: '#667eea' }] },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 2, font: { size: 10 } } }, x: { ticks: { font: { size: 9 } } } } }
                        });
                    }
                }
            };
        }
    </script>
</body>
</html>
