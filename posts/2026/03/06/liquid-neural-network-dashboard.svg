<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LNN Dashboard</title>
</head>
<body style="margin:0;background:#1a1a2e;color:white;font-family:Arial,sans-serif;">
    <!-- SVG Dashboard -->
    <svg viewBox="0 0 1200 1600" style="width:100%;max-width:1200px;display:block;margin:0 auto;">
        <!-- Background -->
        <rect width="1200" height="1600" fill="#1a1a2e"/>
        
        <!-- Title -->
        <text x="600" y="50" text-anchor="middle" fill="#00d4ff" font-size="36" font-weight="bold">🧠 Liquid Neural Networks</text>
        <text x="600" y="85" text-anchor="middle" fill="#888" font-size="16">Research Visualization Dashboard | 2026-03-06</text>
        
        <!-- Stats Boxes -->
        <g transform="translate(50, 120)">
            <rect x="0" y="0" width="200" height="100" rx="15" fill="#0f3460"/>
            <text x="100" y="35" text-anchor="middle" fill="#00d4ff" font-size="14">Literature</text>
            <text x="100" y="70" text-anchor="middle" fill="#00d4ff" font-size="42" font-weight="bold">90+</text>
            <text x="100" y="90" text-anchor="middle" fill="#888" font-size="12">Papers Collected</text>
            
            <rect x="250" y="0" width="200" height="100" rx="15" fill="#0f3460"/>
            <text x="350" y="35" text-anchor="middle" fill="#00ff88" font-size="14">Parameters</text>
            <text x="350" y="70" text-anchor="middle" fill="#00ff88" font-size="42" font-weight="bold">19</text>
            <text x="350" y="90" text-anchor="middle" fill="#888" font-size="12">Neurons for Drone Control</text>
            
            <rect x="500" y="0" width="200" height="100" rx="15" fill="#0f3460"/>
            <text x="600" y="35" text-anchor="middle" fill="#ff6b6b" font-size="14">Efficiency</text>
            <text x="600" y="70" text-anchor="middle" fill="#ff6b6b" font-size="42" font-weight="bold">100x</text>
            <text x="600" y="90" text-anchor="middle" fill="#888" font-size="12">Faster Training</text>
            
            <rect x="750" y="0" width="200" height="100" rx="15" fill="#0f3460"/>
            <text x="850" y="35" text-anchor="middle" fill="#ffd93d" font-size="14">Key Players</text>
            <text x="850" y="70" text-anchor="middle" fill="#ffd93d" font-size="42" font-weight="bold">4</text>
            <text x="850" y="90" text-anchor="middle" fill="#888" font-size="12">Core Researchers</text>
        </g>
        
        <!-- Literature Categories Pie Chart -->
        <g transform="translate(100, 280)">
            <text x="200" y="0" text-anchor="middle" fill="white" font-size="18" font-weight="bold">📚 Literature Categories</text>
            
            <circle cx="200" cy="150" r="100" fill="#00d4ff"/>
            <!-- Segments -->
            <path d="M200,150 L200,50 A100,100 0 0,1 280,105 z" fill="#7b2cbf"/>
            <path d="M200,150 L280,105 A100,100 0 0,1 295,180 z" fill="#00ff88"/>
            <path d="M200,150 L295,180 A100,100 0 0,1 250,245 z" fill="#ff6b6b"/>
            <path d="M200,150 L250,245 A100,100 0 0,1 180,248 z" fill="#ffd93d"/>
            <path d="M200,150 L180,248 A100,100 0 0,1 120,200 z" fill="#6bcf7f"/>
            
            <!-- Legend -->
            <g transform="translate(330, 80)">
                <rect x="0" y="0" width="15" height="15" fill="#00d4ff"/>
                <text x="25" y="12" fill="white" font-size="12">Theory (17%)</text>
                
                <rect x="0" y="25" width="15" height="15" fill="#7b2cbf"/>
                <text x="25" y="37" fill="white" font-size="12">Applications (33%)</text>
                
                <rect x="0" y="50" width="15" height="15" fill="#00ff88"/>
                <text x="25" y="62" fill="white" font-size="12">Architecture (13%)</text>
                
                <rect x="0" y="75" width="15" height="15" fill="#ff6b6b"/>
                <text x="25" y="87" fill="white" font-size="12">Hybrid Models (17%)</text>
                
                <rect x="0" y="100" width="15" height="15" fill="#ffd93d"/>
                <text x="25" y="112" fill="white" font-size="12">Edge Deployment (11%)</text>
                
                <rect x="0" y="125" width="15" height="15" fill="#6bcf7f"/>
                <text x="25" y="137" fill="white" font-size="12">Medical (9%)</text>
            </g>
        </g>
        
        <!-- Application Areas Bar Chart -->
        <g transform="translate(650, 280)">
            <text x="225" y="0" text-anchor="middle" fill="white" font-size="18" font-weight="bold">🎯 Application Areas</text>
            
            <!-- Bars -->
            <g transform="translate(0, 30)">
                <rect x="50" y="0" width="15" height="120" fill="#00d4ff"/>
                <rect x="50" y="125" width="15" height="96" fill="#7b2cbf"/>
                <rect x="50" y="226" width="15" height="80" fill="#00ff88"/>
                <rect x="50" y="311" width="15" height="64" fill="#ff6b6b"/>
                <rect x="50" y="380" width="15" height="80" fill="#ffd93d"/>
                <rect x="50" y="465" width="15" height="64" fill="#6bcf7f"/>
                
                <text x="75" y="10" fill="white" font-size="11">Auto Driving (15)</text>
                <text x="75" y="135" fill="white" font-size="11">Robotics (12)</text>
                <text x="75" y="236" fill="white" font-size="11">Time Series (10)</text>
                <text x="75" y="321" fill="white" font-size="11">Medical (8)</text>
                <text x="75" y="390" fill="white" font-size="11">Edge AI (10)</text>
                <text x="75" y="475" fill="white" font-size="11">Foundation Models (8)</text>
            </g>
        </g>
        
        <!-- Timeline -->
        <g transform="translate(100, 600)">
            <text x="500" y="0" text-anchor="middle" fill="white" font-size="18" font-weight="bold">⏱️ Development Timeline</text>
            
            <line x1="50" y1="80" x2="950" y2="80" stroke="#00d4ff" stroke-width="3"/>
            
            <!-- Timeline points -->
            <circle cx="100" cy="80" r="10" fill="#00d4ff"/>
            <circle cx="220" cy="80" r="10" fill="#7b2cbf"/>
            <circle cx="340" cy="80" r="10" fill="#00ff88"/>
            <circle cx="460" cy="80" r="10" fill="#ff6b6b"/>
            <circle cx="580" cy="80" r="10" fill="#ffd93d"/>
            <circle cx="700" cy="80" r="10" fill="#6bcf7f"/>
            <circle cx="820" cy="80" r="10" fill="#00d4ff"/>
            
            <!-- Labels -->
            <text x="100" y="55" text-anchor="middle" fill="#00d4ff" font-size="14" font-weight="bold">2018</text>
            <text x="100" y="115" text-anchor="middle" fill="#aaa" font-size="11">Neural ODE</text>
            
            <text x="220" y="55" text-anchor="middle" fill="#7b2cbf" font-size="14" font-weight="bold">2020</text>
            <text x="220" y="115" text-anchor="middle" fill="#aaa" font-size="11">LTC Proposed</text>
            
            <text x="340" y="55" text-anchor="middle" fill="#00ff88" font-size="14" font-weight="bold">2021</text>
            <text x="340" y="115" text-anchor="middle" fill="#aaa" font-size="11">LTC (AAAI)</text>
            
            <text x="460" y="55" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">2022</text>
            <text x="460" y="115" text-anchor="middle" fill="#aaa" font-size="11">Closed-form (Nature)</text>
            
            <text x="580" y="55" text-anchor="middle" fill="#ffd93d" font-size="14" font-weight="bold">2023</text>
            <text x="580" y="115" text-anchor="middle" fill="#aaa" font-size="11">Drone (Science)</text>
            
            <text x="700" y="55" text-anchor="middle" fill="#6bcf7f" font-size="14" font-weight="bold">2024</text>
            <text x="700" y="115" text-anchor="middle" fill="#aaa" font-size="11">Liquid FM</text>
            
            <text x="820" y="55" text-anchor="middle" fill="#00d4ff" font-size="14" font-weight="bold">2025</text>
            <text x="820" y="115" text-anchor="middle" fill="#aaa" font-size="11">LFM2-VL/Audio</text>
        </g>
        
        <!-- Architecture Comparison -->
        <g transform="translate(100, 780)">
            <text x="250" y="0" text-anchor="middle" fill="white" font-size="18" font-weight="bold">🏗️ Architecture Comparison</text>
            
            <g transform="translate(0, 30)">
                <!-- Headers -->
                <rect x="0" y="0" width="120" height="35" fill="#0f3460"/>
                <text x="60" y="23" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Feature</text>
                
                <rect x="125" y="0" width="120" height="35" fill="#ff6b6b"/>
                <text x="185" y="23" text-anchor="middle" fill="white" font-size="12" font-weight="bold">LSTM</text>
                
                <rect x="250" y="0" width="120" height="35" fill="#ffd93d"/>
                <text x="310" y="23" text-anchor="middle" fill="black" font-size="12" font-weight="bold">Transformer</text>
                
                <rect x="375" y="0" width="120" height="35" fill="#00ff88"/>
                <text x="435" y="23" text-anchor="middle" fill="black" font-size="12" font-weight="bold">LNN (LTC)</text>
                
                <!-- Row 1 -->
                <rect x="0" y="40" width="120" height="35" fill="#16213e"/>
                <text x="60" y="62" text-anchor="middle" fill="#aaa" font-size="11">Time</text>
                <rect x="125" y="40" width="120" height="35" fill="#16213e"/>
                <text x="185" y="62" text-anchor="middle" fill="#aaa" font-size="11">Discrete</text>
                <rect x="250" y="40" width="120" height="35" fill="#16213e"/>
                <text x="310" y="62" text-anchor="middle" fill="#aaa" font-size="11">Parallel</text>
                <rect x="375" y="40" width="120" height="35" fill="#16213e"/>
                <text x="435" y="62" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="bold">Continuous</text>
                
                <!-- Row 2 -->
                <rect x="0" y="78" width="120" height="35" fill="#0f3460"/>
                <text x="60" y="100" text-anchor="middle" fill="#aaa" font-size="11">Parameters</text>
                <rect x="125" y="78" width="120" height="35" fill="#0f3460"/>
                <text x="185" y="100" text-anchor="middle" fill="#aaa" font-size="11">~100K</text>
                <rect x="250" y="78" width="120" height="35" fill="#0f3460"/>
                <text x="310" y="100" text-anchor="middle" fill="#aaa" font-size="11">Billions</text>
                <rect x="375" y="78" width="120" height="35" fill="#0f3460"/>
                <text x="435" y="100" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="bold">~1K</text>
                
                <!-- Row 3 -->
                <rect x="0" y="116" width="120" height="35" fill="#16213e"/>
                <text x="60" y="138" text-anchor="middle" fill="#aaa" font-size="11">OOD Robust</text>
                <rect x="125" y="116" width="120" height="35" fill="#16213e"/>
                <text x="185" y="138" text-anchor="middle" fill="#aaa" font-size="11">Moderate</text>
                <rect x="250" y="116" width="120" height="35" fill="#16213e"/>
                <text x="310" y="138" text-anchor="middle" fill="#aaa" font-size="11">Good</text>
                <rect x="375" y="116" width="120" height="35" fill="#16213e"/>
                <text x="435" y="138" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="bold">Excellent</text>
                
                <!-- Row 4 -->
                <rect x="0" y="154" width="120" height="35" fill="#0f3460"/>
                <text x="60" y="176" text-anchor="middle" fill="#aaa" font-size="11">Efficiency</text>
                <rect x="125" y="154" width="120" height="35" fill="#0f3460"/>
                <text x="185" y="176" text-anchor="middle" fill="#aaa" font-size="11">Medium</text>
                <rect x="250" y="154" width="120" height="35" fill="#0f3460"/>
                <text x="310" y="176" text-anchor="middle" fill="#aaa" font-size="11">High</text>
                <rect x="375" y="154" width="120" height="35" fill="#0f3460"/>
                <text x="435" y="176" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="bold">Very High</text>
            </g>
        </g>
        
        <!-- Key Researchers -->
        <g transform="translate(700, 780)">
            <text x="225" y="0" text-anchor="middle" fill="white" font-size="18" font-weight="bold">👥 Key Researchers</text>
            
            <g transform="translate(0, 40)">
                <rect x="0" y="0" width="200" height="70" rx="10" fill="#0f3460"/>
                <text x="20" y="25" fill="#00d4ff" font-size="14" font-weight="bold">Ramin Hasani</text>
                <text x="20" y="45" fill="#888" font-size="11">MIT / Liquid AI CEO</text>
                <text x="20" y="60" fill="#00ff88" font-size="10">LTC Main Contributor</text>
                
                <rect x="220" y="0" width="200" height="70" rx="10" fill="#0f3460"/>
                <text x="240" y="25" fill="#00d4ff" font-size="14" font-weight="bold">Mathias Lechner</text>
                <text x="240" y="45" fill="#888" font-size="11">MIT / ISTA</text>
                <text x="240" y="60" fill="#00ff88" font-size="10">LTC Co-Creator</text>
                
                <rect x="0" y="85" width="200" height="70" rx="10" fill="#0f3460"/>
                <text x="20" y="110" fill="#00d4ff" font-size="14" font-weight="bold">Daniela Rus</text>
                <text x="20" y="130" fill="#888" font-size="11">MIT CSAIL Director</text>
                <text x="20" y="145" fill="#00ff88" font-size="10">Robotics Expert</text>
            </g>
        </g>
        
        <!-- Top Papers -->
        <g transform="translate(100, 1050)">
            <text x="500" y="0" text-anchor="middle" fill="white" font-size="18" font-weight="bold">📄 Must-Read Papers</text>
            
            <g transform="translate(0, 30)">
                <rect x="0" y="0" width="1000" height="40" rx="5" fill="#0f3460"/>
                <text x="20" y="25" fill="#ff6b6b" font-size="12" font-weight="bold">Nature 2022</text>
                <text x="120" y="25" fill="white" font-size="12">Closed-form Continuous-time Neural Networks</text>
                <text x="800" y="25" fill="#00ff88" font-size="11">100x Faster Training</text>
                
                <rect x="0" y="45" width="1000" height="40" rx="5" fill="#16213e"/>
                <text x="20" y="70" fill="#7b2cbf" font-size="12" font-weight="bold">AAAI 2021</text>
                <text x="120" y="70" fill="white" font-size="12">Liquid Time-constant Networks</text>
                <text x="800" y="70" fill="#00ff88" font-size="11">Foundation Paper</text>
                
                <rect x="0" y="90" width="1000" height="40" rx="5" fill="#0f3460"/>
                <text x="20" y="115" fill="#ffd93d" font-size="12" font-weight="bold">Science Robotics 2023</text>
                <text x="120" y="115" fill="white" font-size="12">Robust flight navigation with liquid neural networks</text>
                <text x="800" y="115" fill="#00ff88" font-size="11">19 Neurons Only!</text>
                
                <rect x="0" y="135" width="1000" height="40" rx="5" fill="#16213e"/>
                <text x="20" y="160" fill="#6bcf7f" font-size="12" font-weight="bold">Nature SR 2025</text>
                <text x="120" y="160" fill="white" font-size="12">Invertible LNN for robotic manipulators</text>
                <text x="800" y="160" fill="#00ff88" font-size="11">Inverse Kinematics</text>
            </g>
        </g>
        
        <!-- Application Icons -->
        <g transform="translate(100, 1300)">
            <text x="500" y="0" text-anchor="middle" fill="white" font-size="18" font-weight="bold">🚀 Key Applications</text>
            
            <g transform="translate(0, 40)">
                <circle cx="100" cy="60" r="50" fill="#0f3460"/>
                <text x="100" y="65" text-anchor="middle" fill="#00d4ff" font-size="30">🚗</text>
                <text x="100" y="130" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Autonomous</text>
                <text x="100" y="145" text-anchor="middle" fill="#888" font-size="10">Driving</text>
                
                <circle cx="250" cy="60" r="50" fill="#0f3460"/>
                <text x="250" y="65" text-anchor="middle" fill="#7b2cbf" font-size="30">🤖</text>
                <text x="250" y="130" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Robotics</text>
                <text x="250" y="145" text-anchor="middle" fill="#888" font-size="10">Control</text>
                
                <circle cx="400" cy="60" r="50" fill="#0f3460"/>
                <text x="400" y="65" text-anchor="middle" fill="#00ff88" font-size="30">🏥</text>
                <text x="400" y="130" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Medical</text>
                <text x="400" y="145" text-anchor="middle" fill="#888" font-size="10">ECG/EEG</text>
                
                <circle cx="550" cy="60" r="50" fill="#0f3460"/>
                <text x="550" y="65" text-anchor="middle" fill="#ff6b6b" font-size="30">📈</text>
                <text x="550" y="130" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Time Series</text>
                <text x="550" y="145" text-anchor="middle" fill="#888" font-size="10">Forecasting</text>
                
                <circle cx="700" cy="60" r="50" fill="#0f3460"/>
                <text x="700" y="65" text-anchor="middle" fill="#ffd93d" font-size="30">📱</text>
                <text x="700" y="130" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Edge AI</text>
                <text x="700" y="145" text-anchor="middle" fill="#888" font-size="10">Low Power</text>
                
                <circle cx="850" cy="60" r="50" fill="#0f3460"/>
                <text x="850" y="65" text-anchor="middle" fill="#6bcf7f" font-size="30">🧠</text>
                <text x="850" y="130" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Foundation</text>
                <text x="850" y="145" text-anchor="middle" fill="#888" font-size="10">Models</text>
            </g>
        </g>
        
        <!-- Footer -->
        <text x="600" y="1550" text-anchor="middle" fill="#666" font-size="14">Generated by Jarvis | 2026-03-06 | Data: arXiv, Nature, Science, AAAI, MIT CSAIL</text>
